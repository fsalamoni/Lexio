name: Deploy — Firebase Hosting (lexio.web.app) + Firestore/Storage Rules

# ──────────────────────────────────────────────────────────────────────────────
# SECRETS NECESSÁRIOS (GitHub → Settings → Secrets → Actions):
#
#   FIREBASE_TOKEN          ← RECOMENDADO — gere localmente com:
#                               npm install -g firebase-tools
#                               firebase login:ci
#                             Cole o token como secret FIREBASE_TOKEN.
#
#   FIREBASE_SERVICE_ACCOUNT ← ALTERNATIVA — JSON da conta de serviço GCP com
#                               roles: Firebase Hosting Admin + Firebase Rules Admin
#                               no projeto hocapp-44760.
#
#   DATAJUD_API_KEY         ← RECOMENDADO no GitHub para sincronizacao automatica.
#                              Se estiver ausente, o workflow reutiliza o segredo ja
#                              existente em Firebase Secret Manager; se nao existir em
#                              nenhum dos dois lugares, o deploy de Functions falha.
#
# Pelo menos um dos dois deve estar configurado para o deploy funcionar.
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FIREBASE_PROJECT_ID: hocapp-44760
  FIREBASE_HOSTING_DOMAIN: lexio.web.app
  FIREBASE_PRIMARY_AUTH_DOMAIN: hocapp-44760.firebaseapp.com

permissions:
  contents: read
  id-token: write   # necessário para google-github-actions/auth
jobs:
  deploy:
    name: Build & deploy to lexio.web.app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Build frontend ────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Validate frontend Firebase env
        run: |
          if [ -z "$FIREBASE_API_KEY" ]; then
            echo "::error::Missing FIREBASE_API_KEY secret"
            exit 1
          fi
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}

      - name: Validate Firebase web config consistency
        run: node scripts/validate-firebase-web-config.mjs --expected-project "$FIREBASE_PROJECT_ID"
        env:
          VITE_FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ env.FIREBASE_PRIMARY_AUTH_DOMAIN }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ env.FIREBASE_PROJECT_ID }}.firebasestorage.app
          VITE_FIREBASE_APP_ID: '1:143237037612:web:85bd9ddaf81973d5031b89'
          FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT_ID }}

      - name: Typecheck
        run: npm run typecheck
        working-directory: frontend

      - name: Run frontend tests
        run: npm run test
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_DEMO_MODE: 'false'
          VITE_BASE_PATH: /          # Firebase Hosting serve na raiz — sem prefixo /Lexio
          VITE_FIREBASE_API_KEY:             ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ env.FIREBASE_PRIMARY_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:          ${{ env.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:      ${{ env.FIREBASE_PROJECT_ID }}.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '143237037612'
          VITE_FIREBASE_APP_ID:              '1:143237037612:web:85bd9ddaf81973d5031b89'
          VITE_ADMIN_EMAIL:                  ${{ secrets.VITE_ADMIN_EMAIL }}

      - name: Validate build output
        run: |
          test -s frontend/dist/index.html
          test -d frontend/dist/assets
          if [ "$(wc -c < frontend/dist/index.html)" -le 1024 ]; then
            echo "frontend/dist/index.html appears unexpectedly small"
            exit 1
          fi

      - name: Validate Firebase auth domain in bundle
        run: |
          if ! grep -R -q "$FIREBASE_PRIMARY_AUTH_DOMAIN" frontend/dist/assets; then
            echo "::error::Expected auth domain not found in built assets: $FIREBASE_PRIMARY_AUTH_DOMAIN"
            exit 1
          fi

      - name: SPA fallback
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Validate Firebase auth secret
        run: |
          if [ -z "$FIREBASE_TOKEN" ] && [ -z "$FIREBASE_SA" ]; then
            echo "::error::Missing FIREBASE_TOKEN or FIREBASE_SERVICE_ACCOUNT secret"
            exit 1
          fi
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Validate FIREBASE_SERVICE_ACCOUNT payload
        run: node scripts/validate-firebase-service-account.mjs --allow-empty
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Resolve Firebase auth mode
        id: auth_mode
        run: |
          # Prefer FIREBASE_TOKEN (simpler, avoids IAM issues).
          # Fall back to service account only if token is absent.
          if [ -n "$FIREBASE_TOKEN" ]; then
            echo "use_service_account=false" >> "$GITHUB_OUTPUT"
          elif [ -n "$FIREBASE_SA" ]; then
            echo "use_service_account=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_service_account=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # ── Auth opção A: Service Account (apenas se FIREBASE_TOKEN não estiver setado)
      - name: Authenticate via Service Account
        id: google_auth
        if: steps.auth_mode.outputs.use_service_account == 'true'
        continue-on-error: true
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Ensure Firebase CLI auth path
        run: |
          if [ -n "$FIREBASE_TOKEN" ]; then
            echo "Using FIREBASE_TOKEN authentication."
            exit 0
          fi

          if [ "$USE_SERVICE_ACCOUNT" = "true" ] && [ "$GOOGLE_AUTH_OUTCOME" = "success" ]; then
            echo "Using FIREBASE_SERVICE_ACCOUNT authentication via google-github-actions/auth."
            exit 0
          fi

          echo "::error::No valid Firebase authentication method available. Check FIREBASE_TOKEN or FIREBASE_SERVICE_ACCOUNT."
          exit 1
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          USE_SERVICE_ACCOUNT: ${{ steps.auth_mode.outputs.use_service_account }}
          GOOGLE_AUTH_OUTCOME: ${{ steps.google_auth.outcome }}

      - name: Ensure Firebase Auth authorized domains
        if: steps.auth_mode.outputs.use_service_account == 'true' && steps.google_auth.outcome == 'success'
        continue-on-error: true
        env:
          ACCESS_TOKEN: ${{ steps.google_auth.outputs.access_token }}
          HOSTING_DOMAIN: ${{ env.FIREBASE_HOSTING_DOMAIN }}
          PROJECT_ID: ${{ env.FIREBASE_PROJECT_ID }}
          PRIMARY_AUTH_DOMAIN: ${{ env.FIREBASE_PRIMARY_AUTH_DOMAIN }}
        run: |
          node <<'NODE'
          const projectId = process.env.PROJECT_ID;
          const accessToken = process.env.ACCESS_TOKEN;
          const hostingDomain = process.env.HOSTING_DOMAIN;
          const primaryAuthDomain = process.env.PRIMARY_AUTH_DOMAIN;

          if (!projectId || !accessToken || !primaryAuthDomain || !hostingDomain) {
            console.error('Missing Firebase Auth domain sync configuration.');
            process.exit(1);
          }

          const endpoint = `https://identitytoolkit.googleapis.com/admin/v2/projects/${projectId}/config`;
          const requiredDomains = Array.from(new Set([
            primaryAuthDomain,
            hostingDomain,
            `${projectId}.web.app`,
            `${projectId}.firebaseapp.com`,
          ]));

          async function request(url, options = {}) {
            const response = await fetch(url, {
              ...options,
              headers: {
                Authorization: `Bearer ${accessToken}`,
                'Content-Type': 'application/json',
                ...(options.headers || {}),
              },
            });

            if (!response.ok) {
              const body = await response.text();
              throw new Error(`${response.status} ${response.statusText}: ${body}`);
            }

            return response.json();
          }

          async function main() {
            const config = await request(endpoint);
            const currentDomains = Array.isArray(config.authorizedDomains) ? config.authorizedDomains : [];
            const mergedDomains = Array.from(new Set([...currentDomains, ...requiredDomains])).sort();

            if (mergedDomains.length === currentDomains.length &&
                mergedDomains.every((domain, index) => domain === [...currentDomains].sort()[index])) {
              console.log(`Firebase Auth authorized domains already include: ${requiredDomains.join(', ')}`);
              return;
            }

            await request(`${endpoint}?updateMask=authorizedDomains`, {
              method: 'PATCH',
              body: JSON.stringify({ authorizedDomains: mergedDomains }),
            });

            console.log(`Updated Firebase Auth authorized domains: ${mergedDomains.join(', ')}`);
          }

          main().catch((error) => {
            console.error(`Failed to sync Firebase Auth authorized domains: ${error.message}`);
            process.exit(1);
          });
          NODE

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Resolve DataJud secret source
        id: datajud_secret
        run: |
          if [ -n "$DATAJUD_API_KEY" ]; then
            echo "source=github" >> "$GITHUB_OUTPUT"
            echo "GitHub Actions secret DATAJUD_API_KEY found; Firebase Secret Manager will be updated."
            exit 0
          fi

          if firebase functions:secrets:get DATAJUD_API_KEY --project "$FIREBASE_PROJECT_ID" --non-interactive >/dev/null 2>&1; then
            echo "source=firebase" >> "$GITHUB_OUTPUT"
            echo "::warning::GitHub Actions secret DATAJUD_API_KEY is absent. Reusing the existing Firebase Secret Manager secret."
            exit 0
          fi

          echo "::error::Missing DATAJUD_API_KEY in both GitHub Actions and Firebase Secret Manager. Configure one of them before deploying functions."
          exit 1
        env:
          DATAJUD_API_KEY: ${{ secrets['DATAJUD_API_KEY'] }}
          FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Sync DataJud function secret
        if: steps.datajud_secret.outputs.source == 'github'
        run: |
          printf '%s' "$DATAJUD_API_KEY" | firebase functions:secrets:set DATAJUD_API_KEY --project "$FIREBASE_PROJECT_ID" --non-interactive
        env:
          DATAJUD_API_KEY: ${{ secrets['DATAJUD_API_KEY'] }}
          FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # ── Install & build Cloud Functions ────────────────────────────────
      - name: Install functions deps
        run: npm ci
        working-directory: functions

      - name: Build functions
        run: npx tsc
        working-directory: functions

      - name: Validate functions build output
        run: |
          test -s functions/lib/index.js
          if ! grep -q "exports.datajudProxy" functions/lib/index.js; then
            echo "::error::Expected Cloud Function export not found: datajudProxy"
            exit 1
          fi

      # ── Deploy Hosting + Firestore/Storage Rules + Functions ──────────────
      # Auth opção B: FIREBASE_TOKEN (gerado por `firebase login:ci`)
      # Firebase CLI usa FIREBASE_TOKEN se setado, caso contrário usa GOOGLE_APPLICATION_CREDENTIALS
      - name: Deploy to Firebase
        run: |
          firebase deploy \
            --only hosting:lexio,firestore:rules,firestore:indexes,storage,functions \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive
        env:
          FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
