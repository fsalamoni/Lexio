name: Deploy — Firebase Hosting (lexio.web.app) + Firestore Rules

on:
  push:
    branches: [main, 'claude/*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # necessário para google-github-actions/auth

jobs:
  deploy:
    name: Build & deploy to lexio.web.app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Build frontend ────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: npm install
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_DEMO_MODE: 'true'
          VITE_FIREBASE_API_KEY:             ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         hocapp-44760.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID:          hocapp-44760
          VITE_FIREBASE_STORAGE_BUCKET:      hocapp-44760.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '143237037612'
          VITE_FIREBASE_APP_ID:              '1:143237037612:web:85bd9ddaf81973d5031b89'

      - name: SPA fallback
        run: cp frontend/dist/index.html frontend/dist/404.html

      # ── Autenticação via Service Account (método robusto) ─────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      # ── Deploy Hosting + Firestore Rules ──────────────────────────────────
      - name: Deploy to Firebase
        run: |
          firebase deploy \
            --only hosting:lexio,firestore:rules,firestore:indexes \
            --project hocapp-44760 \
            --non-interactive
