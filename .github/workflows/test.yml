name: Tests

on:
  push:
    branches: [main, 'claude/*', 'copilot/*']
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          JWT_SECRET: ci-test-jwt-secret-not-for-production
          DATABASE_URL: postgresql+asyncpg://lexio:lexio@localhost:5432/lexio
          OPENROUTER_API_KEY: sk-or-v1-CI-TEST-KEY
          QDRANT_API_KEY: ci-test-key
        run: |
          pytest tests/ \
            --tb=short \
            -v \
            --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml
          retention-days: 7

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff==0.9.0

      - name: Run ruff check
        run: ruff check packages/ tests/ --output-format=github
        continue-on-error: true   # advisory — does not block merge yet

  frontend-quality:
    name: Frontend quality (TypeScript + Vitest + Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Typecheck frontend
        run: npm run typecheck
        working-directory: frontend

      - name: Run frontend tests
        run: npm run test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
