name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write   # necessário para push na branch gh-pages

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Typecheck
        run: npm run typecheck
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_DEMO_MODE: 'false'
          VITE_BASE_PATH: /Lexio/
          VITE_FIREBASE_API_KEY:             ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         hocapp-44760.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID:          hocapp-44760
          VITE_FIREBASE_STORAGE_BUCKET:      hocapp-44760.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '143237037612'
          VITE_FIREBASE_APP_ID:              '1:143237037612:web:85bd9ddaf81973d5031b89'
          VITE_ADMIN_EMAIL:                  ${{ secrets.VITE_ADMIN_EMAIL }}

      - name: Validate build output
        run: |
          test -s frontend/dist/index.html
          test -d frontend/dist/assets
          if [ "$(wc -c < frontend/dist/index.html)" -le 1024 ]; then
            echo "frontend/dist/index.html appears unexpectedly small"
            exit 1
          fi

      # SPA fallback
      - name: SPA fallback
        run: cp frontend/dist/index.html frontend/dist/404.html

      # Push direto para a branch gh-pages (compatível com "Deploy from a branch")
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
          publish_branch: gh-pages
          force_orphan: false
