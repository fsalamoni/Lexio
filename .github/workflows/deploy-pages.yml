name: Deploy to GitHub Pages

on:
  push:
    branches: [main, 'claude/*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build
        env:
          VITE_DEMO_MODE: 'true'
          VITE_BASE_PATH: /Lexio/
          VITE_FIREBASE_API_KEY:             ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         hocapp-44760.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID:          hocapp-44760
          VITE_FIREBASE_STORAGE_BUCKET:      hocapp-44760.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '143237037612'
          VITE_FIREBASE_APP_ID:              '1:143237037612:web:85bd9ddaf81973d5031b89'
          VITE_ADMIN_EMAIL:                  ${{ secrets.VITE_ADMIN_EMAIL }}

      # SPA fallback — copy index.html to 404.html for client-side routing
      - run: cp dist/index.html dist/404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          publish_branch: gh-pages
          force_orphan: true
