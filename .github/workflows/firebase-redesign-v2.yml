name: Deploy - Firebase Redesign V2 (lexio-redesign-v2-44760.web.app)

on:
  push:
    branches: [redesign/v2-pilot]
  workflow_dispatch:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FIREBASE_PROJECT_ID: hocapp-44760
  FIREBASE_REDESIGN_V2_DOMAIN: lexio-redesign-v2-44760.web.app
  FIREBASE_PRIMARY_AUTH_DOMAIN: hocapp-44760.firebaseapp.com

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build and deploy redesign V2 site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Validate frontend Firebase env
        run: |
          if [ -z "$FIREBASE_API_KEY" ]; then
            echo "::error::Missing FIREBASE_API_KEY secret"
            exit 1
          fi
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}

      - name: Typecheck
        run: npm run typecheck
        working-directory: frontend

      - name: Run frontend tests
        run: npm run test
        working-directory: frontend

      - name: Build redesign V2 site
        run: npm run build
        working-directory: frontend
        env:
          VITE_DEMO_MODE: 'false'
          VITE_BASE_PATH: /
          VITE_BUILD_OUT_DIR: dist-redesign-v2
          VITE_REDESIGN_V2: 'true'
          VITE_REDESIGN_V2_HOME: 'true'
          VITE_FIREBASE_API_KEY:             ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ env.FIREBASE_PRIMARY_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:          ${{ env.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:      ${{ env.FIREBASE_PROJECT_ID }}.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '143237037612'
          VITE_FIREBASE_APP_ID:              '1:143237037612:web:85bd9ddaf81973d5031b89'
          VITE_ADMIN_EMAIL:                  ${{ secrets.VITE_ADMIN_EMAIL }}

      - name: Validate redesign V2 build output
        run: |
          test -s frontend/dist-redesign-v2/index.html
          test -d frontend/dist-redesign-v2/assets
          if [ "$(wc -c < frontend/dist-redesign-v2/index.html)" -le 1024 ]; then
            echo "frontend/dist-redesign-v2/index.html appears unexpectedly small"
            exit 1
          fi

      - name: Validate redesign hostname in bundle
        run: |
          if ! grep -R -q "$FIREBASE_REDESIGN_V2_DOMAIN" frontend/dist-redesign-v2/assets; then
            echo "::error::Expected redesign hostname not found in built assets: $FIREBASE_REDESIGN_V2_DOMAIN"
            exit 1
          fi

      - name: SPA fallback
        run: cp frontend/dist-redesign-v2/index.html frontend/dist-redesign-v2/404.html

      - name: Validate Firebase auth secret
        run: |
          if [ -z "$FIREBASE_TOKEN" ] && [ -z "$FIREBASE_SA" ]; then
            echo "::error::Missing FIREBASE_TOKEN or FIREBASE_SERVICE_ACCOUNT secret"
            exit 1
          fi
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Validate FIREBASE_SERVICE_ACCOUNT payload
        run: node scripts/validate-firebase-service-account.mjs --allow-empty
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Resolve Firebase auth mode
        id: auth_mode
        run: |
          if [ -n "$FIREBASE_TOKEN" ]; then
            echo "use_service_account=false" >> "$GITHUB_OUTPUT"
          elif [ -n "$FIREBASE_SA" ]; then
            echo "use_service_account=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_service_account=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Authenticate via Service Account
        id: google_auth
        if: steps.auth_mode.outputs.use_service_account == 'true'
        continue-on-error: true
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Ensure Firebase CLI auth path
        run: |
          if [ -n "$FIREBASE_TOKEN" ]; then
            echo "Using FIREBASE_TOKEN authentication."
            exit 0
          fi

          if [ "$USE_SERVICE_ACCOUNT" = "true" ] && [ "$GOOGLE_AUTH_OUTCOME" = "success" ]; then
            echo "Using FIREBASE_SERVICE_ACCOUNT authentication via google-github-actions/auth."
            exit 0
          fi

          echo "::error::No valid Firebase authentication method available. Check FIREBASE_TOKEN or FIREBASE_SERVICE_ACCOUNT."
          exit 1
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          USE_SERVICE_ACCOUNT: ${{ steps.auth_mode.outputs.use_service_account }}
          GOOGLE_AUTH_OUTCOME: ${{ steps.google_auth.outcome }}

      - name: Ensure Firebase Auth authorized domains for redesign V2
        if: steps.auth_mode.outputs.use_service_account == 'true' && steps.google_auth.outcome == 'success'
        env:
          ACCESS_TOKEN: ${{ steps.google_auth.outputs.access_token }}
        run: |
          node scripts/firebase-authorized-domains.mjs \
            --project "$FIREBASE_PROJECT_ID" \
            --domain "$FIREBASE_REDESIGN_V2_DOMAIN"

      - name: Warn when authorized-domain sync is skipped
        if: steps.auth_mode.outputs.use_service_account != 'true'
        run: |
          echo "::warning::Automatic Firebase Auth domain sync was skipped because FIREBASE_SERVICE_ACCOUNT is not configured."
          echo "::warning::If login fails on the redesign site, add $FIREBASE_REDESIGN_V2_DOMAIN under Firebase Auth -> Settings -> Authorized domains or run node scripts/firebase-authorized-domains.mjs locally."

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Deploy redesign V2 Hosting site
        run: |
          firebase deploy \
            --only hosting:lexio-redesign-v2 \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive
        env:
          FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}