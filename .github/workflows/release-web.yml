name: Release Web - One Shot

on:
  workflow_dispatch:
    inputs:
      deploy_firebase:
        description: Deploy to Firebase Hosting + Rules + Functions
        required: true
        type: boolean
        default: true
      deploy_github_pages:
        description: Deploy to GitHub Pages (/Lexio)
        required: true
        type: boolean
        default: true
      deploy_redesign_v2:
        description: Deploy redesign V2 Firebase site
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-web-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  quality-gates:
    name: Quality gates
    uses: ./.github/workflows/test.yml
    secrets: inherit

  deploy-firebase:
    name: Deploy Firebase production
    needs: quality-gates
    if: ${{ inputs.deploy_firebase }}
    uses: ./.github/workflows/firebase-deploy.yml
    secrets: inherit

  deploy-pages:
    name: Deploy GitHub Pages
    needs: quality-gates
    if: ${{ inputs.deploy_github_pages }}
    uses: ./.github/workflows/deploy-pages.yml
    secrets: inherit

  deploy-redesign-v2:
    name: Deploy Firebase redesign V2
    needs: quality-gates
    if: ${{ inputs.deploy_redesign_v2 }}
    uses: ./.github/workflows/firebase-redesign-v2.yml
    secrets: inherit

  release-summary:
    name: Release summary
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - quality-gates
      - deploy-firebase
      - deploy-pages
      - deploy-redesign-v2
    steps:
      - name: Print release outcome
        run: |
          echo "quality-gates=${{ needs.quality-gates.result }}"
          echo "deploy-firebase=${{ needs.deploy-firebase.result }}"
          echo "deploy-pages=${{ needs.deploy-pages.result }}"
          echo "deploy-redesign-v2=${{ needs.deploy-redesign-v2.result }}"
