<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="DVLuh-KTNkT82RuGULHAgMgiepfxtI9sFoX5Ll8qC4c" />
    
    <!-- Identity & description — helps Google Safe Browsing classify the site correctly -->
    <meta name="description" content="Lexio — Sistema de produção jurídica com inteligência artificial para advogados e procuradores." />
    <meta name="author" content="Lexio" />
    <meta name="application-name" content="Lexio" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph — helps social crawlers and Google understand the site purpose -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Lexio — Produção Jurídica com IA" />
    <meta property="og:description" content="Sistema de produção jurídica com inteligência artificial para advogados e procuradores." />
    <meta property="og:site_name" content="Lexio" />

    <!-- Security headers via meta (HTTP-header equivalents) -->
    <!-- X-Frame-Options removed: only works as HTTP header, not meta tag -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <!--
      CSP: 'unsafe-inline' no script-src é necessário para o Vite (módulos ES inline no HTML).
      Firebase e Google APIs requerem acesso às origens googleapis.com / firebaseapp.com.
      OpenRouter (openrouter.ai) é necessário para chamadas LLM (geração de ementas, classificação, etc).
      CORS proxies (corsproxy.io, allorigins.win) e DataJud (api-publica.datajud.cnj.jus.br)
      são necessários para pesquisa externa e de jurisprudência no browser.
      worker-src 'self' blob: é necessário para o Web Worker do pdfjs-dist (extração de texto em PDF).
      'unsafe-eval' foi intencionalmente removido para máxima proteção XSS.
    -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests; default-src 'self'; script-src 'self' 'unsafe-inline' https://*.googleapis.com https://*.gstatic.com https://*.firebaseapp.com https://*.firebase.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://*.googleapis.com https://*.firebaseapp.com https://*.firebaseio.com https://*.firebase.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com wss://*.firebaseio.com https://openrouter.ai https://r.jina.ai https://api.allorigins.win https://api.duckduckgo.com https://html.duckduckgo.com https://corsproxy.io https://api-publica.datajud.cnj.jus.br https://*.cloudfunctions.net; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <title>Lexio — Produção Jurídica com IA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
    <body class="bg-gray-50 text-gray-900">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
